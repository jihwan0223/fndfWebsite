<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart Viewer · MFRG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a30;
    --accent: #c8f04d;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --lane0: #ff6b6b;
    --lane1: #ffd93d;
    --lane2: #6bcb77;
    --lane3: #4d96ff;
    --track-w: 72px;
    --note-h: 18px;
    --fall-sec: 1.8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }

  .title-area h2 {
    font-size: 1rem;
    font-weight: 700;
  }
  .title-area p {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .controls { display: flex; gap: 8px; align-items: center; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0d0d0f; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.85; }

  .speed-label {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  input[type=range] {
    accent-color: var(--accent);
    width: 80px;
  }

  .file-btn {
    position: relative;
    overflow: hidden;
  }
  .file-btn input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ── Stage ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    width: 100%;
  }

  .track-wrap {
    display: flex;
    gap: 4px;
    height: 100%;
    position: relative;
  }

  .lane {
    width: var(--track-w);
    height: 100%;
    position: relative;
    background: rgba(255,255,255,0.02);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* hit line */
  .lane::after {
    content: '';
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    height: 3px;
    border-radius: 2px;
    z-index: 10;
  }
  .lane:nth-child(1)::after { background: var(--lane0); box-shadow: 0 0 8px var(--lane0); }
  .lane:nth-child(2)::after { background: var(--lane1); box-shadow: 0 0 8px var(--lane1); }
  .lane:nth-child(3)::after { background: var(--lane2); box-shadow: 0 0 8px var(--lane2); }
  .lane:nth-child(4)::after { background: var(--lane3); box-shadow: 0 0 8px var(--lane3); }

  /* key indicator */
  .key-indicator {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    border-radius: 8px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    z-index: 20;
    transition: background 0.06s;
  }
  .lane:nth-child(1) .key-indicator { border-color: var(--lane0); color: var(--lane0); }
  .lane:nth-child(2) .key-indicator { border-color: var(--lane1); color: var(--lane1); }
  .lane:nth-child(3) .key-indicator { border-color: var(--lane2); color: var(--lane2); }
  .lane:nth-child(4) .key-indicator { border-color: var(--lane3); color: var(--lane3); }
  .lane:nth-child(1) .key-indicator.hit { background: var(--lane0); color: #000; }
  .lane:nth-child(2) .key-indicator.hit { background: var(--lane1); color: #000; }
  .lane:nth-child(3) .key-indicator.hit { background: var(--lane2); color: #000; }
  .lane:nth-child(4) .key-indicator.hit { background: var(--lane3); color: #000; }

  /* ── Note elements ── */
  .note {
    position: absolute;
    left: 6px;
    right: 6px;
    height: var(--note-h);
    border-radius: 4px;
    z-index: 5;
    transform: translateY(0);
  }
  .lane:nth-child(1) .note { background: var(--lane0); box-shadow: 0 0 6px var(--lane0)44; }
  .lane:nth-child(2) .note { background: var(--lane1); box-shadow: 0 0 6px var(--lane1)44; }
  .lane:nth-child(3) .note { background: var(--lane2); box-shadow: 0 0 6px var(--lane2)44; }
  .lane:nth-child(4) .note { background: var(--lane3); box-shadow: 0 0 6px var(--lane3)44; }

  .note.long {
    border-radius: 4px 4px 0 0;
    opacity: 0.85;
  }
  .note.long-body {
    border-radius: 0;
    opacity: 0.4;
  }

  /* ── Empty state ── */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    pointer-events: none;
  }
  .empty-state .icon { font-size: 2.5rem; }
  .empty-state p { font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }

  /* ── Stats overlay ── */
  .stats-overlay {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 30;
    pointer-events: none;
  }
  .stat-pill {
    background: rgba(13,13,15,0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  .stat-pill span { color: var(--accent); }

  @media (max-width: 480px) {
    :root { --track-w: 56px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title-area">
    <h2 id="chartTitle">Chart Viewer</h2>
    <p id="chartMeta">JSON 파일을 불러오세요</p>
  </div>
  <div class="controls">
    <button class="btn file-btn">
      📂 불러오기
      <input type="file" accept=".json" id="fileInput">
    </button>
    <span class="speed-label">속도</span>
    <input type="range" id="speedSlider" min="0.25" max="2" step="0.25" value="1">
    <span class="speed-label" id="speedVal">1.0x</span>
    <button class="btn primary" id="playBtn" disabled>▶ 재생</button>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="stage" id="stage">
  <div class="empty-state" id="emptyState">
    <div class="icon">🎵</div>
    <p>JSON 채보 파일을 불러오세요</p>
  </div>

  <div class="track-wrap" id="trackWrap" style="display:none">
    <div class="lane" id="lane0"><div class="key-indicator" id="key0">D</div></div>
    <div class="lane" id="lane1"><div class="key-indicator" id="key1">F</div></div>
    <div class="lane" id="lane2"><div class="key-indicator" id="key2">J</div></div>
    <div class="lane" id="lane3"><div class="key-indicator" id="key3">K</div></div>
  </div>

  <div class="stats-overlay" id="statsOverlay" style="display:none">
    <div class="stat-pill">BPM <span id="ovBpm">—</span></div>
    <div class="stat-pill">노트 <span id="ovNotes">—</span></div>
    <div class="stat-pill">시간 <span id="ovTime">0:00</span></div>
  </div>
</div>

<script>
  let chartData = null;
  let isPlaying = false;
  let startTime = null;
  let pausedAt = 0;
  let animFrame = null;
  let speed = 1.0;
  let totalDuration = 0;
  let noteElements = []; // { el, timeMs, laneEl, hit }

  const HITLINE_FROM_BOTTOM = 80 + 9; // px, center of hitline
  const FALL_MS = 1800; // how long a note takes to fall (at speed 1x)

  // ── File load ──
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        chartData = JSON.parse(ev.target.result);
        loadChart(chartData, file.name.replace('.json',''));
      } catch(err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
  });

  // ── Speed slider ──
  document.getElementById('speedSlider').addEventListener('input', e => {
    speed = parseFloat(e.target.value);
    document.getElementById('speedVal').textContent = speed.toFixed(2).replace(/\.?0+$/, '') + 'x';
  });

  // ── Play/Pause ──
  document.getElementById('playBtn').addEventListener('click', () => {
    if (!chartData) return;
    if (isPlaying) {
      pausePlayback();
    } else {
      startPlayback();
    }
  });

  // ── Progress bar seek ──
  document.getElementById('progressWrap').addEventListener('click', e => {
    if (!chartData) return;
    const rect = e.target.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    pausedAt = ratio * totalDuration;
    if (isPlaying) {
      cancelAnimationFrame(animFrame);
      startTime = performance.now() - pausedAt / speed;
      animFrame = requestAnimationFrame(tick);
    }
    updateProgress(pausedAt);
  });

  function loadChart(data, title) {
    stop();
    clearNotes();
    noteElements = [];

    document.getElementById('chartTitle').textContent = title;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('trackWrap').style.display = 'flex';
    document.getElementById('statsOverlay').style.display = 'flex';
    document.getElementById('playBtn').disabled = false;

    const notes = data.notes || [];
    totalDuration = notes.length > 0
      ? Math.max(...notes.map(n => n.endTimeMs > 0 ? n.endTimeMs : n.timeMs)) + 2000
      : 0;

    const mins = Math.floor(totalDuration / 60000);
    const secs = Math.floor((totalDuration % 60000) / 1000);
    document.getElementById('ovBpm').textContent = data.bpm || '—';
    document.getElementById('ovNotes').textContent = notes.length.toLocaleString();
    document.getElementById('chartMeta').textContent =
      `${notes.length}노트 · ${data.bpm}BPM · ${mins}:${String(secs).padStart(2,'0')}`;

    pausedAt = 0;
    updateProgress(0);
  }

  function getStageHeight() {
    return document.getElementById('stage').clientHeight;
  }

  // ── Note pool: create note el ──
  function createNoteEl(note, stageH) {
    const laneEl = document.getElementById('lane' + note.lane);
    if (!laneEl) return null;

    const el = document.createElement('div');
    el.className = 'note';
    laneEl.appendChild(el);

    return { el, note, laneEl, hit: false };
  }

  function clearNotes() {
    [0,1,2,3].forEach(i => {
      const lane = document.getElementById('lane' + i);
      lane.querySelectorAll('.note').forEach(n => n.remove());
    });
  }

  // ── Playback ──
  function startPlayback() {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ 일시정지';
    startTime = performance.now() - pausedAt / speed;

    clearNotes();
    noteElements = [];
    const stageH = getStageHeight();
    (chartData.notes || []).forEach(note => {
      const obj = createNoteEl(note, stageH);
      if (obj) {
        obj.el.style.bottom = '-30px';
        noteElements.push(obj);
      }
    });

    animFrame = requestAnimationFrame(tick);
  }

  function pausePlayback() {
    isPlaying = false;
    pausedAt = (performance.now() - startTime) * speed;
    cancelAnimationFrame(animFrame);
    document.getElementById('playBtn').textContent = '▶ 재생';
  }

  function stop() {
    isPlaying = false;
    pausedAt = 0;
    cancelAnimationFrame(animFrame);
    document.getElementById('playBtn').textContent = '▶ 재생';
    if (chartData) document.getElementById('playBtn').disabled = false;
  }

  function tick(now) {
    const elapsed = (now - startTime) * speed; // ms
    const stageH = getStageHeight();
    const hitlineY = HITLINE_FROM_BOTTOM; // from bottom in px
    const fallMs = FALL_MS / speed; // adjusted fall time

    // update progress
    updateProgress(elapsed);
    document.getElementById('ovTime').textContent = formatTime(elapsed);

    // update notes
    noteElements.forEach(obj => {
      const { el, note } = obj;
      const diff = note.timeMs - elapsed; // ms until hit

      // position: diff=0 → hitlineY from bottom, diff=fallMs → top
      const pxFromBottom = hitlineY + (diff / FALL_MS) * (stageH - hitlineY) * speed;

      if (pxFromBottom < -40 || pxFromBottom > stageH + 40) {
        el.style.visibility = 'hidden';
      } else {
        el.style.visibility = 'visible';
        el.style.bottom = pxFromBottom + 'px';

        // long note height
        if (note.type === 1 && note.endTimeMs > 0) {
          const lengthMs = note.endTimeMs - note.timeMs;
          const lengthPx = (lengthMs / FALL_MS) * (stageH - hitlineY) * speed;
          el.style.height = Math.max(18, lengthPx) + 'px';
          el.classList.add('long');
        }
      }
    });

    if (elapsed >= totalDuration) {
      stop();
      clearNotes();
      updateProgress(totalDuration);
      return;
    }

    animFrame = requestAnimationFrame(tick);
  }

  function updateProgress(elapsed) {
    const pct = totalDuration > 0 ? Math.min(100, (elapsed / totalDuration) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  // ── Keyboard flash ──
  const KEY_MAP = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
  document.addEventListener('keydown', e => {
    const lane = KEY_MAP[e.key.toLowerCase()];
    if (lane !== undefined) {
      document.getElementById('key' + lane).classList.add('hit');
    }
    if (e.key === ' ') {
      e.preventDefault();
      document.getElementById('playBtn').click();
    }
  });
  document.addEventListener('keyup', e => {
    const lane = KEY_MAP[e.key.toLowerCase()];
    if (lane !== undefined) {
      document.getElementById('key' + lane).classList.remove('hit');
    }
  });
</script>
</body>
</html>
